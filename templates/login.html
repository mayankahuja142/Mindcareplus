{% extends 'base.html' %}
{% block content %}
<div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="glass-card" style="width: 100%; max-width: 400px;">
        <h2 class="text-center" style="color: var(--primary-color); font-size: 2rem; margin-bottom: 30px;">Login</h2>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <p style="color: red; text-align: center; margin-bottom: 20px;">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem;">Login</button>
        </form>
        <p class="text-center mt-4">Don't have an account? <a href="{{ url_for('auth.signup') }}" style="color: var(--primary-color); text-decoration: none; font-weight: bold;">Sign Up</a></p>
    </div>
</div>
{% endblock %}
