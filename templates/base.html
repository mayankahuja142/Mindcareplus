<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCare+ | Premium Mental Health App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="layout">
        {% if session.get('user_id') %}
        <div class="sidebar glass-card" style="border-radius: 0; box-shadow: none;">
            <h2>MindCare+</h2>
            <nav>
                <a href="{{ url_for('mood.dashboard') }}">📊 Dashboard</a>
                <a href="{{ url_for('journal.journal_page') }}">📓 Journal</a>
                <a href="{{ url_for('chatbot.chat') }}">🤖 AI Chatbot</a>
                <a href="{{ url_for('breathing') }}">🌬️ Breathing</a>
                <a href="{{ url_for('auth.logout') }}" style="margin-top: auto; color: red;">🚪 Logout</a>
            </nav>
        </div>
        {% endif %}
        <div class="main-content">
            {% block content %}{% endblock %}
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
