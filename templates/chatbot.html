{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h1 style="color: var(--primary-color); margin-bottom: 30px;">AI Companion</h1>
    <div class="glass-card fade-in">
        <div class="chat-window" id="chatWindow">
            <div class="message bot">
                Hi {{ session.username }}! I'm here to listen. How can I help you today?
            </div>
        </div>
        <div class="chat-input-wrapper mt-4">
            <input type="text" id="chatInput" placeholder="Type your message..."
                onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" class="btn btn-primary">Send</button>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message) return;

        const chatWindow = document.getElementById('chatWindow');
        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        userDiv.textContent = message;
        chatWindow.appendChild(userDiv);

        input.value = '';
        chatWindow.scrollTop = chatWindow.scrollHeight;

        const botDiv = document.createElement('div');
        botDiv.className = 'message bot';
        botDiv.innerHTML = '<span style="opacity: 0.5;">Typing...</span>';
        chatWindow.appendChild(botDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;

        fetch('/api/chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ message: message })
        })
            .then(response => response.json())
            .then(data => {
                botDiv.innerHTML = '';
                botDiv.textContent = data.response;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            })
            .catch(err => {
                botDiv.innerHTML = '<span style="color: red;">Failed to connect to AI.</span>';
            });
    }
</script>
{% endblock %}
